# ==========================================
# MINIMAL TMUX CONFIG (Basic + Useful)
# ==========================================

# --- Quality of Life ---
set -g mouse on                    # Mouse support
set -g base-index 1                # Windows start at 1
set -g pane-base-index 1           # Panes start at 1
set -g renumber-windows on         # Auto-renumber on close
set -g default-terminal "tmux-256color"
set -g allow-passthrough on

# --- Plugins (Session Persistence) ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore & save
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-processes 'lazygit nvim "~claude" "~codex" cursor-agent'
set -g @resurrect-strategy-nvim 'session'

# --- Word Movement (Option+Arrow in iTerm2) ---
# These sequences match what iTerm2 sends for Option+Arrow
bind-key -n M-Left send-keys Escape b
bind-key -n M-Right send-keys Escape f

# --- Vi-mode for Copy ---
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# --- Initialize TPM (must be at bottom) ---
run '~/.tmux/plugins/tpm/tpm'
